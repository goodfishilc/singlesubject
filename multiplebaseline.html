<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>可調期數-多探測/跨受試者多基線研究圖表產生器</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", "Segoe UI", sans-serif; background-color: #f1f5f9; padding: 30px; margin: 0; color: #1e293b; }
        .container { max-width: 1500px; margin: auto; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        h2 { text-align: center; color: #0f172a; margin-bottom: 5px; font-weight: 800; }
        .subtitle { text-align: center; color: #64748b; font-size: 0.95em; margin-bottom: 30px; }
        
        .setting-section { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .section-title { font-size: 0.9em; font-weight: 700; color: #334155; margin-top: 0; margin-bottom: 15px; border-left: 5px solid #3b82f6; padding-left: 10px; text-transform: uppercase; }
        
        .grid-layout { display: flex; flex-wrap: wrap; gap: 20px; }
        .grid-item { flex: 1; min-width: 200px; }
        
        label { display: block; font-size: 0.85em; color: #64748b; margin-bottom: 6px; font-weight: 600; }
        input, select { width: 100%; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; box-sizing: border-box; background-color: white; }
        input:focus, select:focus { border-color: #3b82f6; outline: none; }
        
        /* 期數設定管理區 */
        .phase-manage-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .btn-phase-del { background-color: #ef4444; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-phase-add { background-color: #475569; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; }

        .subject-block { border: 1px solid #e2e8f0; padding: 15px; border-radius: 10px; background: white; margin-bottom: 15px; }
        .subject-header { font-weight: bold; color: #1e293b; margin-bottom: 10px; border-bottom: 1px solid #f1f5f9; padding-bottom: 5px; }
        
        /* 動態生成的數據行 */
        .data-config-container { display: flex; flex-direction: column; gap: 10px; }
        .condition-row { border-left: 4px solid #cbd5e1; padding-left: 15px; margin-bottom: 10px; }
        .condition-meta { display: flex; gap: 15px; align-items: center; margin-bottom: 8px; }
        .phase-inputs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
        
        .color-picker-wrapper { position: relative; }
        .color-block-btn { width: 45px; height: 38px; border: 1px solid #cbd5e1; border-radius: 8px; cursor: pointer; box-sizing: border-box; }
        .color-menu-panel { display: none; position: absolute; top: 42px; left: 0; background: white; border: 1px solid #cbd5e1; border-radius: 10px; padding: 8px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); z-index: 100; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 130px; }
        .color-menu-panel.active { display: grid; }
        .color-option { width: 22px; height: 22px; border-radius: 4px; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
        .color-option:hover { transform: scale(1.15); }
        
        .btn-group { display: flex; gap: 12px; margin-top: 20px; }
        button.main-btn { flex: 1; padding: 14px; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 700; transition: all 0.2s; }
        .btn-update { background-color: #2563eb; }
        .btn-update:hover { background-color: #1d4ed8; }
        .btn-download { background-color: #059669; }
        .btn-download:hover { background-color: #047857; }
        
        /* 垂直堆疊多圖表配置 */
        .multi-chart-container { display: flex; flex-direction: column; margin-top: 35px; background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 25px; gap: 0px; }
        .chart-row-wrapper { display: flex; align-items: center; position: relative; }
        .y-axis-left-title { writing-mode: vertical-lr; text-orientation: mixed; text-align: center; font-size: 15px; font-weight: bold; color: #334155; width: 40px; }
        .subject-label-side { width: 70px; font-weight: bold; font-size: 14px; text-align: center; color: #475569; }
        .chart-box { flex: 1; height: 240px; position: relative; }
        
        .copyright-footer { margin-top: 30px; padding-top: 20px; border-top: 1px solid #e2e8f0; text-align: right; font-size: 0.8em; color: #94a3b8; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>多探測/跨受試者多基線研究圖表分析儀 (自定義研究階段版)</h2>
    <div class="subtitle">支援任意新增/減少研究期數，系統將動態重組資料庫與渲染對齊階梯線</div>
    
    <div class="input-area">
        <div class="setting-section">
            <div class="section-title">全域座標與標題設定</div>
            <div class="grid-layout">
                <div class="grid-item"><label for="yAxisTitle">縱軸名稱 (Y軸)</label><input type="text" id="yAxisTitle" value="過馬路正確反應的次數"></div>
                <div class="grid-item"><label for="xAxisTitle">橫軸名稱 (X軸)</label><input type="text" id="xAxisTitle" value="評量次數"></div>
                <div class="grid-item"><label for="yMaxVal">Y軸最大值</label><input type="number" id="yMaxVal" value="20"></div>
                <div class="grid-item"><label for="yStepVal">刻度間隔</label><input type="number" id="yStepVal" value="5"></div>
            </div>
        </div>

        <div class="setting-section">
            <div class="section-title">研究階段(期數)自定義管理</div>
            <p style="font-size: 0.85em; color: #64748b; margin-top:-10px; margin-bottom:15px;">您可以在此任意新增、刪除或修改階段名稱。完成修改後請點擊下方「更新多基線圖表」。</p>
            <div id="phasesContainer">
                <div class="phase-manage-row" data-phase-id="0">
                    <input type="text" class="phase-name-setup" value="基線期" placeholder="例如: 基線期">
                    <button class="btn-phase-del" onclick="removePhaseRow(this)">刪除</button>
                </div>
                <div class="phase-manage-row" data-phase-id="1">
                    <input type="text" class="phase-name-setup" value="處理期" placeholder="例如: 處理期">
                    <button class="btn-phase-del" onclick="removePhaseRow(this)">刪除</button>
                </div>
                <div class="phase-manage-row" data-phase-id="2">
                    <input type="text" class="phase-name-setup" value="追蹤期" placeholder="例如: 追蹤期">
                    <button class="btn-phase-del" onclick="removePhaseRow(this)">刪除</button>
                </div>
            </div>
            <button class="btn-phase-add" onclick="addPhaseRow('', true)">+ 增加新研究階段 (如：再介入期/維持期)</button>
        </div>

        <div class="setting-section">
            <div class="section-title">各受試者各階段數據配置 (空值請填 empty)</div>
            <div id="subjectsContainer">
                </div>
        </div>

        <div class="btn-group">
            <button class="main-btn btn-update" onclick="drawAllCharts()">更新多基線圖表</button>
        </div>
    </div>
    
    <div class="multi-chart-container" id="visualOutputArea">
        <div style="display: flex; justify-content: center; gap: 30px; font-size: 0.9em; font-weight: bold; margin-bottom: 10px;">
            <span style="color: #475569;">● 在教室 (訓練情境) 中的表現</span>
            <span style="color: #ea580c;">○ 在街道 (非訓練情境) 上的表現</span>
        </div>
        
        <div id="canvasRowsContainer">
            </div>
        
        <div style="text-align: center; font-weight: bold; font-size: 14px; margin-top: 10px; color: #334155;" id="sharedXTitle">評量次數</div>
    </div>
    
    <div class="copyright-footer">© 俞昭銘@GEMINI 多階段擴充版</div>
</div>

<script>
if (window.ChartAnnotation) Chart.register(window.ChartAnnotation);

let chartInstances = {};
const academic12Colors = ["#475569", "#ea580c", "#1e3a8a", "#16a34a", "#991b1b", "#0284c7", "#7c3aed", "#0d9488", "#e11d48", "#0f172a", "#d97706", "#78350f"];

// 預設經典數據快取，供動態新增期數時填入預設值
const defaultPresetData = {
    A: { line1: ["5, 5, 5", "7, 5, 5, 8, 11, 11, 11, 12, 12, 12, 13", "empty, empty, empty, 14, empty, empty, 14"], line2: ["4, 4, 4", "4, 4, 5, 5, 13, 13, 15, 15, 15, 15", "empty, empty, empty, 15, empty, empty, 15"] },
    B: { line1: ["6, empty, empty", "6, empty, empty, 6, 8, 7, 7, 6, 7, 9, 10, 13, 12, 16", "empty, empty, empty, 15, empty, empty, 15"], line2: ["5, empty, empty", "5, empty, empty, 6, 7, 6, 5, 7, 12, 14, 16, 18", "empty, empty, empty, 16, empty, empty, 16"] },
    C: { line1: ["4, empty, empty, empty, empty, 5, 5, empty, empty, empty, empty", "6, 6, 7, 15, 14, 14, 14, 15, 13", "empty, empty, empty, 13, empty, empty, 13"], line2: ["5, empty, empty, empty, empty, 4, 4, empty, empty, empty, empty", "5, 7, 5, 8, 13, 11, 14, 15, 14", "empty, empty, empty, 14, empty, empty, 14"] }
};

function addPhaseRow(name = '', rebuildInput = false) {
    const container = document.getElementById('phasesContainer');
    const id = container.children.length;
    const row = document.createElement('div');
    row.className = 'phase-manage-row';
    row.setAttribute('data-phase-id', id);
    row.innerHTML = `
        <input type="text" class="phase-name-setup" value="${name}" placeholder="新研究階段名稱">
        <button class="btn-phase-del" onclick="removePhaseRow(this)">刪除</button>
    `;
    container.appendChild(row);
    if(rebuildInput) buildSubjectsDataInputs();
}

function removePhaseRow(btn) {
    btn.parentElement.remove();
    buildSubjectsDataInputs();
}

// 根據定義的期數，動態組裝前端輸入欄位
function buildSubjectsDataInputs() {
    const phases = [];
    document.querySelectorAll('.phase-name-setup').forEach(input => {
        if(input.value.trim()) phases.push(input.value.trim());
    });

    const subjects = ['A', 'B', 'C'];
    const container = document.getElementById('subjectsContainer');
    
    // 記錄目前的輸入數值避免被清空
    const currentValues = {};
    subjects.forEach(sub => {
        currentValues[sub] = { line1: [], line2: [] };
        const oldBlock = document.querySelector(`.subject-block[data-subject="${sub}"]`);
        if (oldBlock) {
            oldBlock.querySelectorAll('.line1-phase-val').forEach(i => currentValues[sub].line1.push(i.value));
            oldBlock.querySelectorAll('.line2-phase-val').forEach(i => currentValues[sub].line2.push(i.value));
        }
    });

    container.innerHTML = '';
    
    subjects.forEach(sub => {
        const block = document.createElement('div');
        block.className = 'subject-block';
        block.setAttribute('data-subject', sub);
        
        let line1GridHTML = '';
        let line2GridHTML = '';
        
        phases.forEach((pName, pIdx) => {
            // 讀取舊值或帶入經典預設值，若無則填 empty
            let val1 = currentValues[sub].line1[pIdx] !== undefined ? currentValues[sub].line1[pIdx] : (defaultPresetData[sub].line1[pIdx] || 'empty');
            let val2 = currentValues[sub].line2[pIdx] !== undefined ? currentValues[sub].line2[pIdx] : (defaultPresetData[sub].line2[pIdx] || 'empty');
            
            line1GridHTML += `<div><label>${pName}</label><input type="text" class="line1-phase-val" value="${val1}"></div>`;
            line2GridHTML += `<div><label>${pName}</label><input type="text" class="line2-phase-val" value="${val2}"></div>`;
        });

        block.innerHTML = `
            <div class="subject-header">個案 ${sub} 數據資料管理</div>
            <div class="data-config-container">
                <div class="condition-row">
                    <div class="condition-meta">
                        <span style="font-weight:bold; font-size:0.9em; color:#475569;">情境一：教室(訓練)</span>
                        <select class="stage-shape s1" style="width:110px; padding:4px;"><option value="filledCircle">● 實心圓</option><option value="circle">○ 空心圓</option></select>
                    </div>
                    <div class="phase-inputs-grid">${line1GridHTML}</div>
                </div>
                <div class="condition-row">
                    <div class="condition-meta">
                        <span style="font-weight:bold; font-size:0.9em; color:#ea580c;">情境二：街道(非訓練)</span>
                        <select class="stage-shape s2" style="width:110px; padding:4px;"><option value="circle">○ 空心圓</option><option value="filledCircle">● 實心圓</option></select>
                    </div>
                    <div class="phase-inputs-grid">${line2GridHTML}</div>
                </div>
            </div>
        `;
        container.appendChild(block);
    });

    // 重新建構下方的畫布列
    const canvasContainer = document.getElementById('canvasRowsContainer');
    canvasContainer.innerHTML = '';
    subjects.forEach((sub, idx) => {
        const row = document.createElement('div');
        row.className = 'chart-row-wrapper';
        row.innerHTML = `
            <div class="y-axis-left-title" ${idx > 0 ? 'style="visibility: hidden;"' : 'id="sharedYTitle"'}>Y軸</div>
            <div class="subject-label-side">個案 ${sub}</div>
            <div class="chart-box"><canvas id="chart_${sub}"></canvas></div>
        `;
        canvasContainer.appendChild(row);
    });
}

function parseInputToArray(str) {
    if(!str.trim()) return [];
    return str.split(',').map(v => {
        const t = v.trim().toLowerCase();
        return (t === 'empty' || t === '') ? null : parseFloat(t);
    });
}

function drawAllCharts() {
    const yTitle = document.getElementById('yAxisTitle').value || '數值';
    const xTitle = document.getElementById('xAxisTitle').value || '評量次數';
    const sharedY = document.getElementById('sharedYTitle');
    if(sharedY) sharedY.innerText = yTitle;
    document.getElementById('sharedXTitle').innerText = xTitle;

    const yMax = parseFloat(document.getElementById('yMaxVal').value) || 20;
    const yStep = parseFloat(document.getElementById('yStepVal').value) || 5;

    // 獲取目前最新定義的期數名稱
    const phases = [];
    document.querySelectorAll('.phase-name-setup').forEach(input => {
        if(input.value.trim()) phases.push(input.value.trim());
    });

    const subjects = ['A', 'B', 'C'];
    
    // 全域算統計各期的總評量次數最大上限，用來對齊橫軸
    let globalMaxX = 10; 

    // 1. 預析各受試者在各期的點數長度，用來計算階梯切換點
    let subjectPhaseLengths = { A: [], B: [], C: [] };
    subjects.forEach(sub => {
        const block = document.querySelector(`.subject-block[data-subject="${sub}"]`);
        const l1Inputs = block.querySelectorAll('.line1-phase-val');
        phases.forEach((_, pIdx) => {
            const arr1 = parseInputToArray(l1Inputs[pIdx].value);
            subjectPhaseLengths[sub].push(arr1.length);
        });
        const totalLen = subjectPhaseLengths[sub].reduce((a, b) => a + b, 0);
        if(totalLen > globalMaxX) globalMaxX = totalLen;
    });

    // 2. 開始個別繪製畫布
    subjects.forEach((sub, subIdx) => {
        const block = document.querySelector(`.subject-block[data-subject="${sub}"]`);
        const isLastSubject = (subIdx === subjects.length - 1);
        
        const shape1 = block.querySelector('.stage-shape.s1').value;
        const shape2 = block.querySelector('.stage-shape.s2').value;
        const l1Inputs = block.querySelectorAll('.line1-phase-val');
        const l2Inputs = block.querySelectorAll('.line2-phase-val');

        let localAnnotations = {};
        let combinedDatasets = [];

        // 整理雙線資料
        let linesConfig = [
            { inputs: l1Inputs, color: '#475569', shape: shape1, name: '教室', classIdx: 'l1' },
            { inputs: l2Inputs, color: '#ea580c', shape: shape2, name: '街道', classIdx: 'l2' }
        ];

        // 計算每一期在 X 軸的累積時間區間座標
        let phaseXEdges = [0.5]; // 第一點起點 1 號
        let currentXPointer = 0.5;
        subjectPhaseLengths[sub].forEach(len => {
            currentXPointer += len;
            phaseXEdges.push(currentXPointer);
        });

        linesConfig.forEach(cfg => {
            let allPts = [];
            let xTracker = 1;
            
            phases.forEach((_, pIdx) => {
                const vals = parseInputToArray(cfg.inputs[pIdx].value);
                vals.forEach(v => {
                    allPts.push({ x: xTracker, y: v });
                    xTracker++;
                });
            });

            let continuousPts = [];
            let probePts = [];

            allPts.forEach((pt, idx) => {
                if (pt.y === null) return;
                const prevEmpty = (idx === 0 || allPts[idx-1].y === null);
                const nextEmpty = (idx === allPts.length - 1 || allPts[idx+1].y === null);

                if (prevEmpty && nextEmpty) {
                    probePts.push(pt);
                    // 智慧判定這個探測點落在哪個研究期數，自動上標標記
                    let matchedPhaseIdx = 1;
                    for(let e=0; e<phaseXEdges.length-1; e++) {
                        if(pt.x >= phaseXEdges[e] && pt.x <= phaseXEdges[e+1]) {
                            matchedPhaseIdx = e + 1;
                            break;
                        }
                    }
                    localAnnotations[`probe_${cfg.classIdx}_${pt.x}`] = {
                        type: 'label',
                        xValue: pt.x,
                        yValue: pt.y,
                        yAdjust: -15,
                        content: `(${matchedPhaseIdx})`,
                        color: '#1e293b',
                        font: { size: 10, weight: 'bold' }
                    };
                } else {
                    continuousPts.push(pt);
                }
            });

            combinedDatasets.push({
                label: cfg.name,
                data: continuousPts,
                borderColor: cfg.color,
                backgroundColor: cfg.shape === 'circle' ? '#ffffff' : cfg.color,
                borderWidth: 2,
                pointStyle: 'circle',
                pointRadius: 5,
                showLine: true,
                spanGaps: false,
                tension: 0
            });

            combinedDatasets.push({
                label: cfg.name + ' (探測)',
                data: probePts,
                borderColor: cfg.color,
                backgroundColor: cfg.shape === 'circle' ? '#ffffff' : cfg.color,
                borderWidth: 2,
                pointStyle: 'circle',
                pointRadius: 5,
                showLine: false
            });
        });

        // 3. 動態階梯分界垂直實線繪製
        for(let p = 0; p < phaseXEdges.length - 2; p++) {
            let boundaryX = phaseXEdges[p+1];
            localAnnotations[`boundary_line_${p}`] = {
                type: 'line',
                xMin: boundaryX,
                xMax: boundaryX,
                borderColor: '#000000',
                borderWidth: 1.5
            };
        }

        // 4. 自動尋找名稱含有「追蹤」的期數索引，在其前方建立雙斜線斷軸 (//)
        let followUpIdx = phases.findIndex(name => name.includes('追蹤'));
        if (followUpIdx !== -1 && followUpIdx > 0) {
            let breakX = phaseXEdges[followUpIdx];
            localAnnotations['axis_break_1'] = { type: 'label', xValue: breakX - 0.2, yValue: 0, yAdjust: 10, content: '/', color: '#94a3b8', font: { size: 16 } };
            localAnnotations['axis_break_2'] = { type: 'label', xValue: breakX + 0.2, yValue: 0, yAdjust: 10, content: '/', color: '#94a3b8', font: { size: 16 } };
        }

        // 5. 頂部期數名稱文字 (僅在第一個畫布呈現)
        if (subIdx === 0) {
            phases.forEach((pName, pIdx) => {
                let midX = (phaseXEdges[pIdx] + phaseXEdges[pIdx+1]) / 2;
                localAnnotations[`title_text_${pIdx}`] = {
                    type: 'label',
                    xValue: midX,
                    yValue: yMax,
                    yAdjust: -20,
                    content: pName,
                    font: { size: 13, weight: 'bold' }
                };
            });
        }

        const ctx = document.getElementById(`chart_${sub}`).getContext('2d');
        if (chartInstances[sub]) chartInstances[sub].destroy();

        chartInstances[sub] = new Chart(ctx, {
            type: 'line',
            data: { datasets: combinedDatasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: { padding: { top: subIdx === 0 ? 25 : 10, bottom: 5, left: 10, right: 20 } },
                scales: {
                    x: {
                        type: 'linear',
                        min: 0,
                        max: globalMaxX + 1,
                        ticks: {
                            stepSize: 3,
                            display: isLastSubject,
                            color: '#000000',
                            font: { weight: 'bold' }
                        },
                        grid: { display: false },
                        border: { display: true, color: '#000000', width: 1.5 }
                    },
                    y: {
                        type: 'linear',
                        min: 0,
                        max: yMax,
                        ticks: {
                            stepSize: yStep,
                            color: '#000000',
                            font: { weight: 'bold' }
                        },
                        grid: { display: false },
                        border: { display: true, color: '#000000', width: 1.5 }
                    }
                },
                plugins: {
                    legend: { display: false },
                    annotation: { annotations: localAnnotations }
                }
            }
        });
    });
}

window.onload = () => {
    buildSubjectsDataInputs();
    setTimeout(drawAllCharts, 300);
};
</script>

</body>
</html>
